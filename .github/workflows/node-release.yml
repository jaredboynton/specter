name: Node Release

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'bindings/node/**'
      - '.github/workflows/node-release.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Native builds - these work reliably
  build-native:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-14
            target: aarch64-apple-darwin
            build: npm run build
          - host: macos-14
            target: x86_64-apple-darwin
            build: npm run build -- --target x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build
    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bindings/node/package.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install dependencies
        run: |
          cd bindings/node
          npm install

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake nasm -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        run: |
          cd bindings/node
          ${{ matrix.settings.build }}
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.13'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: bindings/node/*.node
          if-no-files-found: error

  # Docker-based builds for cross-compilation targets
  # boring-sys requires native compilation due to CMake + Go + assembly complexity
  build-linux-arm64:
    name: Build aarch64-unknown-linux-gnu (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD":/workspace -w /workspace \
            node:20-bookworm bash -c "
              set -ex
              apt-get update
              apt-get install -y cmake clang libclang-dev curl build-essential pkg-config
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              . ~/.cargo/env
              cd bindings/node
              npm install
              npm run build
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-aarch64-unknown-linux-gnu
          path: bindings/node/*.node
          if-no-files-found: error

  build-linux-musl:
    name: Build x86_64-unknown-linux-musl (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build in Alpine container
        run: |
          docker run --rm \
            -v "$PWD":/workspace -w /workspace \
            node:20-alpine sh -c "
              set -ex
              apk add --no-cache cmake clang clang-dev llvm-dev musl-dev linux-headers perl go curl build-base pkgconfig
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              . ~/.cargo/env
              rustup target add x86_64-unknown-linux-musl
              cd bindings/node
              npm install
              npm run build -- --target x86_64-unknown-linux-musl
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-musl
          path: bindings/node/*.node
          if-no-files-found: error

  test:
    name: Test bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bindings/node/package.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev

      - name: Install dependencies
        run: |
          cd bindings/node
          npm install

      - name: Build
        run: |
          cd bindings/node
          npm run build:debug

      - name: Test
        run: |
          cd bindings/node
          npm test

  publish:
    name: Publish to npm
    needs: [build-native, build-linux-arm64, build-linux-musl, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bindings/node/artifacts
          pattern: bindings-*

      - name: Move artifacts
        run: |
          cd bindings/node
          mkdir -p npm
          for dir in artifacts/bindings-*/; do
            cp "${dir}"*.node npm/ 2>/dev/null || true
          done
          ls -la npm/

      - name: Publish
        run: |
          cd bindings/node
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
