# Cross-compilation configuration for Specter

[target.x86_64-unknown-linux-musl]
rustflags = [
  "-C", "panic=abort",
  "-C", "link-self-contained=yes",
  "-C", "target-feature=+crt-static",
  "-C", "link-arg=-static",
  # Use libc++ instead of libstdc++ for static linking
  "-C", "link-arg=-stdlib=libc++",
  "-C", "link-arg=-lc++",
  "-C", "link-arg=-lc++abi",
]
linker = "zig"

[target.aarch64-unknown-linux-gnu]
rustflags = [
  "-C", "link-self-contained=yes",
]
linker = "zig"
