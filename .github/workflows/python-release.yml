name: Python Release

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'bindings/python/**'
      - '.github/workflows/python-release.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      # QEMU required for aarch64 builds on x86_64 runners
      - name: Setup QEMU
        if: matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/python/Cargo.toml
          manylinux: manylinux_2_28
          before-script-linux: |
            # Install cmake and clang for BoringSSL (bindgen needs libclang >= 5.0)
            # manylinux_2_28 uses AlmaLinux 8 with dnf
            # Also install perl which BoringSSL's build system requires
            dnf install -y cmake clang clang-devel llvm-devel perl-IPC-Cmd
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl

  musllinux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      # QEMU required for aarch64 builds on x86_64 runners
      - name: Setup QEMU
        if: matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/python/Cargo.toml
          manylinux: musllinux_1_2
          before-script-linux: |
            # Install cmake and clang for BoringSSL (bindgen needs libclang >= 5.0)
            # Also install perl and go which BoringSSL's build system requires
            apk add --no-cache cmake clang-dev clang-static llvm-dev musl-dev linux-headers perl go
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist/*.whl

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64, x86]
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          choco install cmake nasm -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/python/Cargo.toml
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/*.whl

  macos:
    runs-on: macos-14
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/python/Cargo.toml
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m bindings/python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev
      # maturin develop requires a virtualenv - create one explicitly
      - name: Create virtualenv and install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install maturin pytest pytest-asyncio
      - name: Build and install (maturin develop)
        run: |
          . .venv/bin/activate
          maturin develop --release -m bindings/python/Cargo.toml
      - name: Run tests
        run: |
          . .venv/bin/activate
          cd bindings/python
          pytest tests/ -v

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [linux, musllinux, windows, macos, sdist]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
