name: Node Release

on:
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'bindings/node/**'
      - '.github/workflows/node-release.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # Native builds (no cross-compilation needed)
          - host: macos-14
            target: aarch64-apple-darwin
            build: npm run build
          - host: macos-14
            target: x86_64-apple-darwin
            build: npm run build -- --target x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npm run build
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: npm run build
          # Cross-compilation using cargo-zigbuild via napi --cross-compile
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: npm run build -- --target aarch64-unknown-linux-gnu --cross-compile
            cross: true
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: npm run build -- --target x86_64-unknown-linux-musl --cross-compile
            cross: true
    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bindings/node/package.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install dependencies
        run: |
          cd bindings/node
          npm install

      # Install zig for cross-compilation builds
      - name: Install Zig
        if: matrix.settings.cross
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.settings.cross
        run: cargo install cargo-zigbuild

      # All Linux builds need cmake + clang for bindgen
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake nasm -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        run: |
          cd bindings/node
          ${{ matrix.settings.build }}
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.13'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: bindings/node/*.node
          if-no-files-found: error

  test:
    name: Test bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bindings/node/package.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libclang-dev

      - name: Install dependencies
        run: |
          cd bindings/node
          npm install

      - name: Build
        run: |
          cd bindings/node
          npm run build:debug

      - name: Test
        run: |
          cd bindings/node
          npm test

  publish:
    name: Publish to npm
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bindings/node/artifacts
          pattern: bindings-*

      - name: Move artifacts
        run: |
          cd bindings/node
          mkdir -p npm
          for dir in artifacts/bindings-*/; do
            cp "${dir}"*.node npm/ 2>/dev/null || true
          done
          ls -la npm/

      - name: Publish
        run: |
          cd bindings/node
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
